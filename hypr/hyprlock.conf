# =============================================
# Fixed hyprlock.conf for v0.9.3
# =============================================

# --- Variables (define colors here) ---
$wall = /home/lnxusr/.config/wall/9.png          # ← Change if your username or path is different

# Gruvbox Dark Palette
$bg        = rgba(282828ee)
$fg        = rgba(ebdbb2ff)
$red       = rgba(cc241dff)
$green     = rgba(98971aff)
$yellow    = rgba(d79921ff)
$blue      = rgba(458588ff)
$purple    = rgba(b16286ff)
$aqua      = rgba(689d6aff)
$orange    = rgba(d65d0eff)

$primary   = $fg
$accent    = $aqua
$text      = $fg
$input_bg  = rgba(3c3836cc)
$input_outer = $yellow
# --- General ---
general {
    hide_cursor = false
}

# --- Background ---
background {
    monitor =
    path = $wall
    # path = screenshot          # uncomment if you want current desktop blur instead
    blur_passes = 1
    blur_size = 1
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
    color = rgba(00000099)       # fallback color
}

# --- Time ---
label {
    monitor =
    text = cmd[update:30000] echo "$(date +"%R")"
    color = $primary
    font_size = 90
    font_family = sans-serif      # change to your font if you have one defined
    position = 30, 0
    halign = left
    valign = top
}

# --- Date ---
label {
    monitor =
    text = cmd[update:43200000] echo "$(date +"%A, %d %B %Y")"
    color = $accent
    font_size = 25
    font_family = sans-serif
    position = 30, -150
    halign = left
    valign = top
}

# --- Greeting / User ---
label {
    monitor =
    text = cmd[update:60000] echo "Hi, $USER"
    color = $accent
    font_size = 30
    font_family = sans-serif
    position = 0, 100
    halign = center
    valign = center
}

# --- Input Field ---
input-field {
    monitor =
    size = 280, 50
    outline_thickness = 3
    dots_size = 0.33
    dots_spacing = 0.15
    dots_center = true
    dots_rounding = -1
    outer_color = $input_outer
    inner_color = $input_bg
    font_color = $text
    fade_on_empty = false
    placeholder_text = <i>Enter Password : 1 </i>
    hide_input = false
    rounding = -1
    check_color = $accent
    fail_color = rgb(204, 34, 34)
    fail_text = <i>Wrong Password ($ATTEMPTS)</i>
    capslock_color = -1
    numlock_color = -1
    position = 0, 0
    halign = center
    valign = center
}

# --- Optional Splash / Bottom text (simplified) ---
label {
    monitor =
    text = cmd[update:1000] echo "Hyprland"
    color = rgba(ffffff88)
    font_size = 14
    font_family = sans-serif
    position = 0, 20
    halign = center
    valign = bottom
}
