[window]
opacity = 0.69
dimensions = { columns = 100, lines = 30 }
padding = { x = 5, y = 5 }
decorations = "Full"
startup_mode = "Windowed"

[font]
normal = { family = "monospace", style = "Regular" }
size = 10.0

[colors.primary]
background = "0x000000"
foreground = "0xffffff"

[cursor]
style = "Block"
blink_interval = 500

[terminal.shell]
program = "/bin/fish"
